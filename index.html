<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Notes</title>

<!-- iOS PWA: hides Safari bar when launched from home screen -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Notes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root { --gold:#f5a623; }

  html, body {
    height:100%; width:100%;
    background:#000; color:#fff;
    font-family:-apple-system,'SF Pro Text','Helvetica Neue',sans-serif;
    overflow:hidden;
    user-select:none; -webkit-user-select:none;
  }

  /* ── NAV BAR — floats at top ── */
  .nav-bar {
    position:fixed;
    top:0; left:0; right:0;
    z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding: env(safe-area-inset-top, 14px) 8px 6px;
    background:#000;
    border-bottom:.5px solid rgba(255,255,255,.08);
  }

  .nav-back {
    color:var(--gold); font-size:17px; font-weight:400;
    display:flex; align-items:center; gap:4px;
    padding:6px 10px 6px 2px;
  }
  .nav-center { display:flex; align-items:center; gap:16px; }
  .nav-btn { background:none; border:none; padding:6px; cursor:pointer; display:flex; align-items:center; }
  .nav-done { color:var(--gold); font-size:17px; font-weight:600; padding:6px 8px; cursor:pointer; }

  /* ── BOTTOM TOOLBAR — floats at bottom ── */
  .toolbar {
    position:fixed;
    bottom:0; left:0; right:0;
    z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 18px calc(env(safe-area-inset-bottom, 0px) + 14px);
    background:#000;
    border-top:.5px solid rgba(255,255,255,.1);
  }
  .toolbar button { background:none; border:none; padding:4px 6px; cursor:pointer; }

  /* ── CONTENT — fills middle, scrolls independently ── */
  .content {
    position:fixed;
    top:0; bottom:0; left:0; right:0;
    /* will be set by JS once nav/toolbar heights are known */
    overflow-y:scroll;
    -webkit-overflow-scrolling:touch;
    overscroll-behavior:contain;
    padding:4px 20px 20px;
  }

  .text-layer {
    min-height:calc(100vh * 1.5);
    position:relative;
    font-size:16px; line-height:1.6; color:#fff; word-break:break-word;
  }
  .placeholder {
    position:absolute; top:0; left:0;
    color:rgba(255,255,255,.28); font-size:16px;
    pointer-events:none; transition:opacity .2s;
  }
  #liveTyping { white-space:pre-wrap; word-break:break-word; min-height:26px; }
  .cursor {
    display:inline-block; width:2px; height:19px;
    background:var(--gold); vertical-align:text-bottom;
    margin-left:1px; border-radius:1px;
    animation:blink 1.05s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* frozen */
  .frozen-text { font-size:16px; line-height:1.6; color:#fff; white-space:pre-wrap; word-break:break-word; }
  .frozen-text.waiting { animation:waitGlow 1.8s ease-in-out infinite; }
  @keyframes waitGlow {
    0%,100%{ text-shadow:none; }
    50%{ text-shadow:0 0 14px rgba(245,166,35,.45); }
  }

  /* end-word */
  .end-word-display {
    font-size:16px; line-height:1.6; color:var(--gold);
    opacity:0; animation:endWordAppear 0.6s ease-out forwards;
  }
  @keyframes endWordAppear {
    0%  { opacity:0; transform:translateY(6px) scale(.95); filter:blur(4px); }
    100%{ opacity:1; transform:translateY(0) scale(1); filter:blur(0); }
  }



  /* ── MAGIC FADE ── */
  .magic-word { display:inline; animation:magicFade 1.5s ease-out forwards; }
  @keyframes magicFade {
    0%  { opacity:1; filter:blur(0); color:#fff; }
    20% { opacity:1; filter:blur(0); color:var(--gold); }
    60% { opacity:.5; filter:blur(4px); color:var(--gold); }
    100%{ opacity:0; filter:blur(12px); }
  }

  /* sparkles */
  .sparkle {
    position:fixed; border-radius:50%; pointer-events:none;
    animation:sparklePop .9s ease-out forwards;
  }
  @keyframes sparklePop {
    0%  { transform:translate(0,0) scale(0); opacity:1; }
    100%{ transform:translate(var(--dx),var(--dy)) scale(1); opacity:0; }
  }
  #sparkle-layer { position:fixed; inset:0; pointer-events:none; z-index:90; }

  /* ── SETTINGS POPUP ── */
  .settings-backdrop {
    position:fixed; inset:0; z-index:200;
    display:none; align-items:flex-start; justify-content:center;
    padding-top:90px;
    background:rgba(0,0,0,.45);
    backdrop-filter:blur(6px);
  }
  .settings-backdrop.open { display:flex; }

  .settings-sheet {
    background:#2c2c2e;
    border-radius:18px;
    width:calc(100% - 40px); max-width:340px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.6);
    animation:sheetSlide .25s ease-out;
  }
  @keyframes sheetSlide {
    from{ opacity:0; transform:translateY(-14px) scale(.97); }
    to  { opacity:1; transform:translateY(0) scale(1); }
  }

  .settings-header {
    padding:16px 20px 12px;
    border-bottom:.5px solid rgba(255,255,255,.1);
    display:flex; align-items:center; justify-content:space-between;
  }
  .settings-title { font-size:15px; font-weight:600; color:#fff; letter-spacing:-.2px; }
  .settings-close {
    background:rgba(255,255,255,.1); border:none; border-radius:50%;
    width:28px; height:28px; cursor:pointer; color:rgba(255,255,255,.7);
    font-size:16px; display:flex; align-items:center; justify-content:center;
  }

  .settings-row {
    padding:14px 20px;
    border-bottom:.5px solid rgba(255,255,255,.06);
  }
  .settings-row:last-child { border-bottom:none; }
  .settings-label {
    font-size:12px; font-weight:500;
    color:rgba(255,255,255,.45); letter-spacing:.5px;
    text-transform:uppercase; margin-bottom:10px;
  }

  /* Duration slider */
  .dur-row { display:flex; align-items:center; gap:12px; }
  .dur-slider {
    flex:1; -webkit-appearance:none; appearance:none;
    height:4px; border-radius:2px; outline:none; cursor:pointer;
    background: linear-gradient(to right, var(--gold) 0%, var(--gold) var(--pct,50%), rgba(255,255,255,.2) var(--pct,50%));
  }
  .dur-slider::-webkit-slider-thumb {
    -webkit-appearance:none; width:22px; height:22px;
    border-radius:50%; background:#fff;
    box-shadow:0 2px 6px rgba(0,0,0,.4); cursor:pointer;
  }
  .dur-val {
    font-size:17px; font-weight:600; color:var(--gold);
    min-width:30px; text-align:right;
  }

  /* End word input */
  .end-word-input {
    width:100%; background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    border-radius:10px; padding:10px 14px;
    color:#fff; font-size:16px; outline:none;
    font-family:-apple-system,sans-serif;
  }
  .end-word-input::placeholder { color:rgba(255,255,255,.3); }
  .end-word-input:focus { border-color:rgba(245,166,35,.5); }

  .settings-save {
    margin:16px 20px;
    width:calc(100% - 40px);
    background:var(--gold); color:#000;
    border:none; border-radius:12px;
    padding:13px; font-size:16px; font-weight:600;
    cursor:pointer; letter-spacing:-.2px;
  }
  .settings-save:active { opacity:.85; }

  /* hidden input */
  #real-input {
    position:fixed; opacity:0; top:200px; left:0;
    width:100%; height:1px; font-size:16px;
    pointer-events:none; z-index:-1; background:transparent; border:none;
  }
</style>
</head>
<body>



<!-- Nav Bar -->
<div class="nav-bar">
  <div class="nav-back" id="navBack">
    <svg width="9" height="15" viewBox="0 0 9 15" fill="none">
      <path d="M7.5 1.5L1.5 7.5L7.5 13.5" stroke="#f5a623" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="nav-back-text" id="navBackText">
      Notes
    </span>
  </div>

  <div class="nav-center">
    <button class="nav-btn" aria-label="Undo">
      <svg width="26" height="22" viewBox="0 0 26 22" fill="none">
        <path d="M8 14H3V9" stroke="#f5a623" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 14C4.8 9.8 9 7 13.5 7 18.7 7 23 11.3 23 16.5" stroke="#f5a623" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="nav-btn" aria-label="Redo">
      <svg width="26" height="22" viewBox="0 0 26 22" fill="none">
        <path d="M18 14h5V9" stroke="#f5a623" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M23 14C21.2 9.8 17 7 12.5 7 7.3 7 3 11.3 3 16.5" stroke="#f5a623" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
    </button>
    <button class="nav-btn" aria-label="Share">
      <svg width="22" height="24" viewBox="0 0 22 24" fill="none">
        <path d="M11 1v16M6 6l5-5 5 5" stroke="#f5a623" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 12v9a1 1 0 001 1h14a1 1 0 001-1v-9" stroke="#f5a623" stroke-width="1.7" stroke-linecap="round"/>
      </svg>
    </button>

    <!-- HOLD THIS BUTTON for settings -->
    <button class="nav-btn" id="moreBtn" aria-label="More" style="position:relative;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="10" stroke="#f5a623" stroke-width="1.7"/>
        <circle cx="8" cy="12" r="1.3" fill="#f5a623"/>
        <circle cx="12" cy="12" r="1.3" fill="#f5a623"/>
        <circle cx="16" cy="12" r="1.3" fill="#f5a623"/>
      </svg>
    </button>
  </div>

  <div class="nav-done" id="doneBtn">Done</div>
</div>

<!-- Content -->
<div class="content" id="content">
  <div class="text-layer" id="textLayer">
    <span class="placeholder" id="placeholder"></span>
    <div id="liveTyping"></div>
  </div>
</div>

<!-- Bottom Toolbar -->
<div class="toolbar">
  <button aria-label="Text format">
    <svg width="26" height="20" viewBox="0 0 26 20" fill="none">
      <text x="0" y="16" font-family="-apple-system,sans-serif" font-size="17" fill="#f5a623" font-weight="500">Aa</text>
    </svg>
  </button>
  <button aria-label="List" id="listIconBtn" style="position:relative; display:flex; align-items:center; justify-content:center;">
    <svg width="24" height="22" viewBox="0 0 24 22" fill="none">
      <circle cx="5" cy="11" r="4.5" stroke="#f5a623" stroke-width="1.5"/>
      <path d="M12 8h10M12 14h10" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span id="toolbarDot" style="
      position:absolute;
      left:11px; top:50%; transform:translate(-50%,-50%);
      width:3px; height:3px;
      background:#f5a623;
      border-radius:50%;
      opacity:0;
      transition:opacity 0.15s;
      pointer-events:none;
    "></span>
  </button>
  <button aria-label="Table">
    <svg width="24" height="22" viewBox="0 0 24 22" fill="none">
      <rect x="2" y="3" width="20" height="16" rx="2" stroke="#f5a623" stroke-width="1.5"/>
      <path d="M2 9h20M2 15h20M12 3v16" stroke="#f5a623" stroke-width="1.5"/>
    </svg>
  </button>
  <button aria-label="Attach">
    <svg width="22" height="24" viewBox="0 0 22 24" fill="none">
      <path d="M20 11l-9 9a6 6 0 01-8.5-8.5L11 3a4 4 0 015.5 5.5L8 17a2 2 0 01-2.8-2.8L13 7" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <!-- ACTIVATE TOGGLE: circle with diagonal, tap to add cross -->
  <button aria-label="Activate" id="activateBtn" style="position:relative; display:flex; align-items:center; justify-content:center;">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" id="activateSvg">
      <circle cx="12" cy="12" r="9.5" stroke="#f5a623" stroke-width="1.5"/>
      <!-- first diagonal line always visible -->
      <line x1="7" y1="7" x2="17" y2="17" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round"/>
      <!-- second diagonal line: hidden until activated -->
      <line id="activateLine2" x1="17" y1="7" x2="7" y2="17" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" opacity="0" style="transition:opacity 0.2s;"/>
    </svg>
  </button>
  <button aria-label="New note" onclick="activateInput()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
      <path d="M11 4H6a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2v-5" stroke="#f5a623" stroke-width="1.6" stroke-linecap="round"/>
      <path d="M18.5 2.5l3 3L12 15H9v-3l9.5-9.5z" stroke="#f5a623" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<!-- Hidden input -->
<input id="real-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="sentences" spellcheck="false">



<!-- Sparkle layer -->
<div id="sparkle-layer"></div>

<!-- ── SETTINGS POPUP ── -->
<div class="settings-backdrop" id="settingsBackdrop">
  <div class="settings-sheet">
    <div class="settings-header">
      <span class="settings-title">✦ Magic Settings</span>
      <button class="settings-close" id="settingsClose">✕</button>
    </div>

    <div class="settings-row">
      <div class="settings-label">Countdown Duration</div>
      <div class="dur-row">
        <input type="range" class="dur-slider" id="durSlider" min="1" max="30" value="5" step="1">
        <span class="dur-val" id="durVal">5s</span>
      </div>
    </div>

    <div class="settings-row">
      <div class="settings-label">End Word / Message</div>
      <input type="text" class="end-word-input" id="endWordInput"
        placeholder="e.g. Gone ✨ or Poof! or …"
        autocomplete="off" autocorrect="off" autocapitalize="sentences">
    </div>

    <button class="settings-save" id="settingsSave">Save</button>
  </div>
</div>

<script>
/* ── Position content between nav and toolbar ── */
function fixLayout() {
  const nav     = document.querySelector('.nav-bar');
  const toolbar = document.querySelector('.toolbar');
  const content = document.getElementById('content');
  const navH    = nav.getBoundingClientRect().height;
  const tbH     = toolbar.getBoundingClientRect().height;
  content.style.top    = navH + 'px';
  content.style.bottom = tbH + 'px';
}
window.addEventListener('load', fixLayout);
window.addEventListener('resize', fixLayout);
setTimeout(fixLayout, 100);
// Show cursor immediately on load
setTimeout(renderLive, 150);
const realInput        = document.getElementById('real-input');
const textLayer        = document.getElementById('textLayer');
const liveTyping       = document.getElementById('liveTyping');
const placeholder      = document.getElementById('placeholder');
const sparkleLayer     = document.getElementById('sparkle-layer');
const content          = document.getElementById('content');
const oDot             = document.getElementById('toolbarDot');
const moreBtn          = document.getElementById('moreBtn');
const settingsBackdrop = document.getElementById('settingsBackdrop');
const settingsClose    = document.getElementById('settingsClose');
const settingsSave     = document.getElementById('settingsSave');
const durSlider        = document.getElementById('durSlider');
const durVal           = document.getElementById('durVal');
const endWordInput     = document.getElementById('endWordInput');
const activateBtn      = document.getElementById('activateBtn');
const activateLine2    = document.getElementById('activateLine2');

// States: idle | typing | waiting | countdown | fading | editing
let appState    = 'idle';
let typedText   = '';
let frozenEl    = null;
let cdTimer     = null;
let cdLeft      = 0;
let cdDuration  = 5;
let endWord     = '';
let magicActive = false; // whether the activate toggle is ON

/* ── Activate toggle button ── */
activateBtn.addEventListener('click', () => {
  magicActive = !magicActive;
  activateLine2.style.opacity = magicActive ? '1' : '0';
});

/* ── Keyboard open ── */
function activateInput() {
  if (appState === 'countdown' || appState === 'fading') return;
  realInput.style.top = '50%';
  realInput.style.pointerEvents = 'auto';
  realInput.focus();
  realInput.style.pointerEvents = 'none';
}

/* ── Live bounce back to top on finger lift ── */
content.addEventListener('touchend', () => {
  if (content.scrollTop > 0) {
    content.scrollTo({ top: 0, behavior: 'smooth' });
  }
}, { passive: true });

content.addEventListener('click', (e) => {
  if (appState === 'waiting' && magicActive) { startCountdown(); return; }
  if (appState === 'idle' || appState === 'editing' || appState === 'waiting') {
    activateInput();
  }
});

/* ── Done button ── */
document.getElementById('doneBtn').addEventListener('click', () => realInput.blur());

/* ── Input gains focus ── */
realInput.addEventListener('focus', () => {
  if (appState === 'countdown' || appState === 'fading') return;
  appState = 'typing';
  if (frozenEl) { frozenEl.remove(); frozenEl = null; }
  typedText = realInput.value;
  renderLive();
});

/* ── User types ── */
realInput.addEventListener('input', () => {
  typedText = realInput.value;
  placeholder.style.opacity = typedText.length ? '0' : '1';
  renderLive();
});

/* ── Keyboard dismissed ── */
realInput.addEventListener('blur', () => {
  if (appState !== 'typing') return;

  if (!typedText.trim()) {
    appState = 'idle';
    typedText = '';
    realInput.value = '';
    liveTyping.innerHTML = '';
    placeholder.style.opacity = '1';
    return;
  }

  // Go to waiting — but countdown only fires if magicActive is on
  appState = 'waiting';
  frozenEl = document.createElement('div');
  frozenEl.className = 'frozen-text';
  frozenEl.textContent = typedText;
  textLayer.insertBefore(frozenEl, liveTyping);
  liveTyping.innerHTML = '';
  placeholder.style.opacity = '0';
});

/* ── Render live text + cursor ── */
function renderLive() {
  liveTyping.innerHTML = '';
  placeholder.style.opacity = typedText ? '0' : '1';
  if (appState === 'typing') {
    if (typedText) liveTyping.appendChild(document.createTextNode(typedText));
  }
  // Show cursor when idle or typing (not when frozen/fading)
  if (appState === 'idle' || appState === 'typing') {
    const cur = document.createElement('span');
    cur.className = 'cursor';
    liveTyping.appendChild(cur);
  }
}

/* ── Start countdown ── */
function startCountdown() {
  if (appState !== 'waiting' || !magicActive) return;
  appState = 'countdown';
  if (frozenEl) frozenEl.classList.remove('waiting');

  cdLeft = cdDuration;
  oDot.style.opacity = '0';

  cdTimer = setInterval(() => {
    cdLeft--;
    if (cdLeft <= 1) {
      oDot.style.opacity = '1';
    }
    if (cdLeft <= 0) {
      clearInterval(cdTimer);
      doMagicFade();
    }
  }, 1000);
}

/* ── Magic fade ── */
function doMagicFade() {
  appState = 'fading';
  const text = typedText;
  if (frozenEl) { frozenEl.remove(); frozenEl = null; }

  const line = document.createElement('div');
  line.style.cssText = 'font-size:16px;line-height:1.6;word-break:break-word;white-space:pre-wrap;';

  const words = text.split(/(\s+)/);
  words.forEach((w, i) => {
    const s = document.createElement('span');
    s.className = 'magic-word';
    s.textContent = w;
    s.style.animationDelay = `${i * 0.07}s`;
    line.appendChild(s);
  });

  textLayer.insertBefore(line, liveTyping);
  spawnSparkles();

  const fadeDur = words.length * 70 + 1700;
  setTimeout(() => {
    line.remove();
    oDot.style.opacity = '0';

    if (endWord.trim()) {
      const ew = document.createElement('div');
      ew.className = 'end-word-display';
      ew.textContent = endWord.trim();
      textLayer.insertBefore(ew, liveTyping);
      setTimeout(() => {
        ew.remove();
        restoreTextForEditing(endWord.trim());
      }, 800);
    } else {
      typedText = '';
      realInput.value = '';
      placeholder.style.opacity = '1';
      appState = 'idle';
      renderLive();
    }
  }, fadeDur);
}

/* ── Restore end word as editable text ── */
function restoreTextForEditing(text) {
  typedText = text;
  realInput.value = text;
  appState = 'editing';

  frozenEl = document.createElement('div');
  frozenEl.className = 'frozen-text';
  frozenEl.textContent = text;
  textLayer.insertBefore(frozenEl, liveTyping);
  placeholder.style.opacity = '0';
}

/* ── Sparkles ── */
function spawnSparkles() {
  const rect = content.getBoundingClientRect();
  for (let i = 0; i < 26; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'sparkle';
      const x = rect.left + 16 + Math.random() * (rect.width - 32);
      const y = rect.top + 8 + Math.random() * 110;
      const a = Math.random() * Math.PI * 2;
      const d = 28 + Math.random() * 58;
      s.style.cssText = `left:${x}px;top:${y}px;
        width:${2+Math.random()*4}px;height:${2+Math.random()*4}px;
        background:${Math.random()>.45?'#f5a623':'#fff9e0'};
        --dx:${Math.cos(a)*d}px;--dy:${Math.sin(a)*d}px;`;
      sparkleLayer.appendChild(s);
      setTimeout(() => s.remove(), 1000);
    }, i * 30);
  }
}

/* ── Settings (hold ••• button) ── */
let holdTimer = null;

function openSettings() {
  durSlider.value = cdDuration;
  updateSliderStyle();
  durVal.textContent = `${cdDuration}s`;
  endWordInput.value = endWord;
  settingsBackdrop.classList.add('open');
}
function closeSettings() {
  settingsBackdrop.classList.remove('open');
  endWordInput.blur();
}

moreBtn.addEventListener('mousedown',   () => { holdTimer = setTimeout(openSettings, 500); });
moreBtn.addEventListener('touchstart',  (e) => { e.preventDefault(); holdTimer = setTimeout(openSettings, 500); }, { passive: false });
moreBtn.addEventListener('mouseup',     () => clearTimeout(holdTimer));
moreBtn.addEventListener('mouseleave',  () => clearTimeout(holdTimer));
moreBtn.addEventListener('touchend',    () => clearTimeout(holdTimer));
moreBtn.addEventListener('touchcancel', () => clearTimeout(holdTimer));

settingsClose.addEventListener('click', closeSettings);
settingsBackdrop.addEventListener('click', e => { if (e.target === settingsBackdrop) closeSettings(); });

settingsSave.addEventListener('click', () => {
  cdDuration = parseInt(durSlider.value, 10);
  endWord    = endWordInput.value;
  closeSettings();
});

durSlider.addEventListener('input', () => {
  durVal.textContent = `${durSlider.value}s`;
  updateSliderStyle();
});

function updateSliderStyle() {
  const pct = ((durSlider.value - durSlider.min) / (durSlider.max - durSlider.min)) * 100;
  durSlider.style.setProperty('--pct', pct + '%');
}
updateSliderStyle();

document.addEventListener('gesturestart', e => e.preventDefault());
</script>
</body>
</html>
